<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时语音对话测试</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/video-controls.css">
</head>
<body>
    <div class="container">
        <h1>实时语音对话测试</h1>

        <div id="status" class="status disconnected">
            未连接
        </div>

        <div class="controls">
            <button id="connectBtn" class="btn-connect">连接</button>
            <button id="disconnectBtn" class="btn-disconnect" disabled>断开</button>
        </div>

        <div class="mode-switcher">
            <button id="voiceModeBtn" class="mode-btn active">语音模式</button>
            <button id="videoModeBtn" class="mode-btn">视频模式</button>
        </div>

        <div id="voiceMode" class="voice-mode">
            <div class="voice-status">
                <span id="voiceStatus">准备开始通话</span>
            </div>

            <div class="volume-indicator-container">
                <div id="volumeBar" class="volume-bar"></div>
            </div>

            <button id="callToggleBtn" class="call-button" aria-pressed="false">
                <span class="call-icon">📞</span>
                <span id="callToggleText" class="call-text">开始通话</span>
            </button>

            <div id="voiceHint" class="voice-hint">点击开始后将自动持续监听，无需按住按钮。</div>
        </div>

        <div id="videoMode" class="video-mode" style="display:none;">
            <div class="video-preview-container">
                <video id="videoPreview" autoplay muted></video>
                <button id="togglePreviewBtn" class="toggle-preview-btn">隐藏预览</button>
            </div>

            <div class="visual-analysis-panel">
                <h3>视觉理解</h3>
                <div id="visualAnalysisContent" class="visual-analysis-content"></div>
            </div>

            <div class="voice-status">
                <span id="videoVoiceStatus">准备开始视频通话</span>
            </div>

            <div class="volume-indicator-container">
                <div id="videoVolumeBar" class="volume-bar"></div>
            </div>

            <button id="videoCallToggleBtn" class="call-button" aria-pressed="false">
                <span class="call-icon">📹</span>
                <span id="videoCallToggleText" class="call-text">开始视频通话</span>
            </button>

            <div id="videoHint" class="voice-hint">视频通话将同时采集音频和视频，AI 可以看到您的画面。</div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
